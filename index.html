<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var RESERVED = ['', 'blogs', 'about', 'contact', 'privacy', 'admin', '404'];
        var injected = false;
        function isPreviewPath(pathname) {
          var parts = pathname.split('/').filter(Boolean);
          if (parts.length !== 1) return false;
          return RESERVED.indexOf(parts[0].toLowerCase()) === -1;
        }
        function injectVignette() {
          if (injected) return;
          if (!isPreviewPath(location.pathname)) return;
          injected = true;
          var s = document.createElement('script');
          s.dataset.zone = '11257020';
          s.src = 'https://n6wxm.com/vignette.min.js';
          (document.body || document.documentElement).appendChild(s);
        }
        function onRouteChange() { injectVignette(); }
        var _push = history.pushState;
        history.pushState = function () {
          var r = _push.apply(this, arguments);
          onRouteChange();
          return r;
        };
        var _replace = history.replaceState;
        history.replaceState = function () {
          var r = _replace.apply(this, arguments);
          onRouteChange();
          return r;
        };
        window.addEventListener('popstate', onRouteChange);
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', injectVignette);
        } else {
          injectVignette();
        }
      })();
    </script>

    <meta name="referrer" content="no-referrer">
